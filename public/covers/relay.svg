<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08171c"/><stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="48%" r="55%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.24"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#e0fbff"/><stop offset="0.5" stop-color="#7dd3fc"/><stop offset="1" stop-color="#22d3ee"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- flow lines: prompt -> gateway -> response -->
  <g stroke="#22d3ee" stroke-width="2" opacity="0.5" stroke-linecap="round">
    <path d="M222 224 H332"/>
    <path d="M468 224 H560"/>
  </g>

  <!-- prompt bubble (incoming) -->
  <g>
    <rect x="74" y="176" width="150" height="96" rx="22" fill="#0b2a33" stroke="#22d3ee" stroke-width="2"/>
    <path d="M104 270 L92 296 L130 271 Z" fill="#0b2a33" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round"/>
    <g fill="#7dd3fc">
      <circle cx="115" cy="224" r="7"/><circle cx="149" cy="224" r="7"/><circle cx="183" cy="224" r="7"/>
    </g>
  </g>

  <!-- memory orbit (it remembers / semantic cache) -->
  <ellipse cx="400" cy="224" rx="104" ry="88" stroke="#22d3ee" stroke-width="1.6" stroke-opacity="0.4" stroke-dasharray="3 9"/>
  <circle cx="400" cy="136" r="4" fill="#7dd3fc"/>

  <!-- gateway node -->
  <rect x="334" y="158" width="132" height="132" rx="28" fill="#0b2a33" stroke="#22d3ee" stroke-width="2.5"/>

  <!-- AI sparkle (the LLM signal) -->
  <g filter="url(#soft)">
    <path d="M400 186 C400 213 413 226 440 226 C413 226 400 239 400 266 C400 239 387 226 360 226 C387 226 400 213 400 186 Z" fill="url(#spark)"/>
    <path d="M433 191 C433 200 437 204 446 204 C437 204 433 208 433 217 C433 208 429 204 420 204 C429 204 433 200 433 191 Z" fill="#e0fbff"/>
  </g>

  <!-- response bubble (outgoing) -->
  <g>
    <rect x="560" y="176" width="166" height="96" rx="22" fill="#0b2a33" stroke="#22d3ee" stroke-width="2"/>
    <path d="M696 270 L708 296 L670 271 Z" fill="#0b2a33" stroke="#22d3ee" stroke-width="2" stroke-linejoin="round"/>
    <g fill="#7dd3fc" opacity="0.85">
      <rect x="582" y="200" width="120" height="9" rx="4.5"/>
      <rect x="582" y="219" width="96" height="9" rx="4.5"/>
      <rect x="582" y="238" width="68" height="9" rx="4.5"/>
    </g>
  </g>

  <!-- ambient sparkles -->
  <g fill="#7dd3fc" opacity="0.7">
    <path d="M250 96 C250 104 254 108 262 108 C254 108 250 112 250 120 C250 112 246 108 238 108 C246 108 250 104 250 96 Z"/>
    <path d="M548 350 C548 356 551 359 557 359 C551 359 548 362 548 368 C548 362 545 359 539 359 C545 359 548 356 548 350 Z"/>
  </g>
</svg>
