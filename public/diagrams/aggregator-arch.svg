  <rect x="36" y="492" width="828" height="44" rx="14" fill="#1a1407" fill-opacity="0.55" stroke="#fbbf24" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
  <text x="450" y="520" text-anchor="middle" font-size="12.5" fill="#fef3c7">community layer: peer article submissions pass an approval workflow before they publish</text>
