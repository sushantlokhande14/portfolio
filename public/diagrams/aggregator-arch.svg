<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="abg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#241a08"/><stop offset="1" stop-color="#0c0a07"/>
    </linearGradient>
    <radialGradient id="aglow" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.14"/><stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <marker id="aarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="900" height="560" rx="18" fill="url(#abg)"/>
  <rect width="900" height="560" rx="18" fill="url(#aglow)"/>

  <text x="36" y="52" font-size="12" fill="#fde68a" opacity="0.7" letter-spacing="2">THE FIELD, FIRST-HAND</text>

  <g stroke="#fbbf24" stroke-width="1.8" stroke-opacity="0.8">
    <rect x="36" y="70" width="190" height="64" rx="12" fill="#1a1407"/>
    <rect x="36" y="158" width="190" height="64" rx="12" fill="#1a1407"/>
    <rect x="36" y="246" width="190" height="64" rx="12" fill="#1a1407"/>
    <rect x="36" y="334" width="190" height="64" rx="12" fill="#1a1407"/>
  </g>

  <text x="131" y="97" text-anchor="middle" font-size="13.5" font-weight="600" fill="#fef3c7">arXiv</text>
  <text x="131" y="117" text-anchor="middle" font-size="11.5" fill="#fde68a" opacity="0.75">feedparser</text>
  <text x="131" y="185" text-anchor="middle" font-size="13.5" font-weight="600" fill="#fef3c7">GitHub API</text>
  <text x="131" y="205" text-anchor="middle" font-size="11.5" fill="#fde68a" opacity="0.75">trending repos</text>
  <text x="131" y="273" text-anchor="middle" font-size="13.5" font-weight="600" fill="#fef3c7">Papers with Code</text>
  <text x="131" y="293" text-anchor="middle" font-size="11.5" fill="#fde68a" opacity="0.75">API</text>
  <text x="131" y="361" text-anchor="middle" font-size="13.5" font-weight="600" fill="#fef3c7">Google Scholar +</text>
  <text x="131" y="381" text-anchor="middle" font-size="11.5" fill="#fde68a" opacity="0.75">scholarly · BeautifulSoup</text>

  <g stroke="#fbbf24" stroke-width="2" opacity="0.6" fill="none">
    <path d="M226 102 H242 V234"/>
    <path d="M226 190 H242 V234"/>
    <path d="M226 278 H242 V254"/>
    <path d="M226 366 H242 V254"/>
    <path d="M242 244 H258" marker-end="url(#aarr)"/>
  </g>

  <g stroke="#fbbf24" stroke-width="2">
    <rect x="266" y="196" width="190" height="96" rx="14" fill="#1a1407"/>
    <rect x="496" y="196" width="180" height="96" rx="14" fill="#1a1407"/>
    <rect x="716" y="196" width="148" height="96" rx="14" fill="#1a1407" stroke-width="2.5"/>
  </g>

  <text x="361" y="230" text-anchor="middle" font-size="16" font-weight="600" fill="#fef3c7">ingest</text>
  <text x="361" y="252" text-anchor="middle" font-size="12" fill="#fde68a" opacity="0.85">normalize five formats</text>
  <text x="361" y="270" text-anchor="middle" font-size="12" fill="#fde68a" opacity="0.6">into one feed</text>

  <text x="586" y="230" text-anchor="middle" font-size="16" font-weight="600" fill="#fef3c7">SQLite</text>
  <text x="586" y="252" text-anchor="middle" font-size="12" fill="#fde68a" opacity="0.85">via SQLAlchemy</text>
  <text x="586" y="270" text-anchor="middle" font-size="12" fill="#fde68a" opacity="0.6">Users · SavedItems · PeerArticles</text>

  <text x="790" y="230" text-anchor="middle" font-size="16" font-weight="600" fill="#fef3c7">Flask app</text>
  <text x="790" y="252" text-anchor="middle" font-size="12" fill="#fde68a" opacity="0.85">login · roles · saved lists</text>
  <text x="790" y="270" text-anchor="middle" font-size="12" fill="#fde68a" opacity="0.6">Jinja + Bootstrap UI</text>

  <g stroke="#fbbf24" stroke-width="2" opacity="0.8">
    <path d="M456 244 H488" marker-end="url(#aarr)"/>
    <path d="M676 244 H708" marker-end="url(#aarr)"/>
