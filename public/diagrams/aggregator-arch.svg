  <text x="770" y="416" text-anchor="middle" font-size="14" font-weight="600" fill="#fef3c7">OpenAI chatbot</text>
  <text x="770" y="438" text-anchor="middle" font-size="11.5" fill="#fde68a" opacity="0.75">ask the hub, not a search bar</text>
