<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0912"/><stop offset="1" stop-color="#0d0609"/>
    </linearGradient>
    <radialGradient id="dglow" cx="50%" cy="35%" r="60%">
      <stop offset="0" stop-color="#fb7185" stop-opacity="0.16"/><stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <filter id="dsoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="900" height="660" rx="18" fill="url(#dbg)"/>
  <rect width="900" height="660" rx="18" fill="url(#dglow)"/>

  <g stroke="#fb7185" stroke-width="2">
    <rect x="36" y="80" width="190" height="96" rx="14" fill="#2a0d18"/>
    <rect x="266" y="80" width="240" height="96" rx="14" fill="#2a0d18"/>
    <rect x="546" y="80" width="318" height="96" rx="14" fill="#2a0d18"/>
  </g>

  <text x="131" y="112" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">upload</text>
  <text x="131" y="134" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">submissions zip + rubric</text>
  <text x="131" y="152" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">PDFs, notebooks, code, images…</text>

  <text x="386" y="112" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">parser pool</text>
  <text x="386" y="134" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">7 formats → canonical artifacts</text>
  <text x="386" y="152" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">QuestionMapper, gated on doubt</text>

  <text x="705" y="112" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">orchestration</text>
  <text x="705" y="134" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">Kafka event bus, replayable</text>
  <text x="705" y="152" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">Temporal: one workflow per student</text>

  <g stroke="#fb7185" stroke-width="2" opacity="0.8">
    <path d="M226 128 H258" marker-end="url(#arr)"/>
    <path d="M506 128 H538" marker-end="url(#arr)"/>
  </g>

  <path d="M705 176 V208 H316 V232" stroke="#fb7185" stroke-width="2" opacity="0.6" fill="none" marker-end="url(#arr)"/>
  <text x="726" y="200" font-size="11.5" fill="#fda4af" opacity="0.7">parallel dispatch</text>

  <rect x="36" y="240" width="560" height="96" rx="14" fill="#2a0d18" stroke="#fb7185" stroke-width="2.5"/>
  <text x="316" y="272" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">six grading agents, in parallel</text>
  <text x="316" y="294" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">theory (RAG) · code exec (sandbox) · style · derivation · figure · plagiarism</text>
  <text x="316" y="312" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">+ CrossChecker · FeedbackSynthesizer</text>
  <path d="M592 230 C592 239 596 243 605 243 C596 243 592 247 592 256 C592 247 588 243 579 243 C588 243 592 239 592 230 Z" fill="#ffe4e6" filter="url(#dsoft)"/>

  <path d="M596 288 H628" stroke="#fb7185" stroke-width="2" opacity="0.8" marker-end="url(#arr)"/>

  <rect x="636" y="240" width="228" height="96" rx="14" fill="#2a0d18" stroke="#fb7185" stroke-width="2"/>
  <text x="750" y="272" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">confidence gate</text>
  <text x="750" y="294" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">high → auto-approve · export</text>
  <text x="750" y="312" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">low → review queue, 3-click audit</text>

  <g>
    <rect x="36" y="400" width="828" height="52" rx="14" fill="#2a0d18" fill-opacity="0.55" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
    <text x="450" y="432" text-anchor="middle" font-size="12.5" fill="#ffe4e6">data plane: Postgres 16 (RLS, hashed IDs) · Redis (prompt + retrieval cache, locks) · Qdrant (RAG) · MinIO (artifacts)</text>
  </g>
  <g>
    <rect x="36" y="480" width="828" height="52" rx="14" fill="#2a0d18" fill-opacity="0.55" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
    <text x="450" y="512" text-anchor="middle" font-size="12.5" fill="#ffe4e6">LLM runtime: Qwen 2.5 32B via Ollama / vLLM, local-first · hosted Claude behind an explicit toggle · Docker + gVisor sandbox</text>
  </g>
  <g>
    <rect x="36" y="560" width="828" height="52" rx="14" fill="#2a0d18" fill-opacity="0.55" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
    <text x="450" y="592" text-anchor="middle" font-size="12.5" fill="#ffe4e6">observability: OpenTelemetry spans on every LLM call (tokens, latency, cost) → Prometheus → Grafana</text>
  </g>
</svg>
