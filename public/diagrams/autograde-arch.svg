<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 660" width="900" height="660" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0912"/><stop offset="1" stop-color="#0d0609"/>
    </linearGradient>
    <radialGradient id="dglow" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#fb7185" stop-opacity="0.16"/><stop offset="1" stop-color="#fb7185" stop-opacity="0"/>
    </radialGradient>
    <filter id="dsoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#fb7185"/>
    </marker>
  </defs>

  <rect width="900" height="660" rx="18" fill="url(#dbg)"/>
  <rect width="900" height="660" rx="18" fill="url(#dglow)"/>

  <!-- instructor test suites feed the runner -->
  <rect x="250" y="34" width="188" height="58" rx="12" fill="#2a0d18" stroke="#fb7185" stroke-width="1.6" stroke-opacity="0.65"/>
  <text x="344" y="58" text-anchor="middle" font-size="13.5" fill="#ffe4e6">instructor test suites</text>
  <text x="344" y="78" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">pytest · JUnit</text>
  <path d="M344 92 V132" stroke="#fb7185" stroke-width="2" opacity="0.6" marker-end="url(#arr)"/>

  <!-- main pipeline -->
  <g stroke="#fb7185" stroke-width="2">
    <rect x="36" y="140" width="170" height="96" rx="14" fill="#2a0d18"/>
    <rect x="246" y="140" width="196" height="96" rx="14" fill="#2a0d18" stroke-width="2.5"/>
    <rect x="482" y="140" width="172" height="96" rx="14" fill="#2a0d18"/>
    <rect x="694" y="140" width="170" height="96" rx="14" fill="#2a0d18"/>
  </g>

  <text x="121" y="176" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">submissions</text>
  <text x="121" y="198" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">400+ Java &amp; Python</text>
  <text x="121" y="216" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">in a cycle at peak</text>

  <text x="344" y="176" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">runner</text>
  <text x="344" y="198" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">one isolated process each</text>
  <text x="344" y="216" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">hard timeout, output caps</text>

  <text x="568" y="176" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">rubric engine</text>
  <text x="568" y="198" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">outcomes map to points</text>
  <text x="568" y="216" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">every student, zero drift</text>

  <text x="779" y="176" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">reports</text>
  <text x="779" y="198" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">gradebook CSV</text>
  <text x="779" y="216" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">per-student detail</text>

  <g stroke="#fb7185" stroke-width="2" opacity="0.8">
    <path d="M206 188 H238" marker-end="url(#arr)"/>
    <path d="M442 188 H474" marker-end="url(#arr)"/>
    <path d="M654 188 H686" marker-end="url(#arr)"/>
  </g>

  <!-- rubric failures feed the drafter -->
  <path d="M568 236 V296 H146 V332" stroke="#fb7185" stroke-width="2" opacity="0.6" fill="none" marker-end="url(#arr)"/>
  <text x="588" y="280" font-size="11.5" fill="#fda4af" opacity="0.7">failure patterns</text>

  <!-- feedback row: drafter -> review -> reports; API on the right -->
  <rect x="36" y="340" width="220" height="96" rx="14" fill="#2a0d18" stroke="#fb7185" stroke-width="2"/>
  <text x="146" y="374" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">LLM drafter</text>
  <text x="146" y="396" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">local models via Ollama</text>
  <text x="146" y="414" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">student code never leaves</text>
  <path d="M253 330 C253 339 257 343 266 343 C257 343 253 347 253 356 C253 347 249 343 240 343 C249 343 253 339 253 330 Z" fill="#ffe4e6" filter="url(#dsoft)"/>

  <path d="M256 388 H292 " stroke="#fb7185" stroke-width="2" opacity="0.8" marker-end="url(#arr)"/>
  <text x="274" y="376" text-anchor="middle" font-size="11.5" fill="#fda4af" opacity="0.7">draft</text>

  <rect x="300" y="340" width="220" height="96" rx="14" fill="#2a0d18" stroke="#fb7185" stroke-width="2"/>
  <text x="410" y="374" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">human review</text>
  <text x="410" y="396" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">the TA edits and approves</text>
  <text x="410" y="414" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">the model never decides</text>

  <path d="M470 340 V304 H740 V244" stroke="#fb7185" stroke-width="2" opacity="0.6" fill="none" marker-end="url(#arr)"/>
  <text x="726" y="296" text-anchor="end" font-size="11.5" fill="#fda4af" opacity="0.7">approved feedback</text>

  <path d="M800 236 V332" stroke="#fb7185" stroke-width="2" opacity="0.6" marker-end="url(#arr)"/>

  <rect x="660" y="340" width="204" height="96" rx="14" fill="#2a0d18" stroke="#fb7185" stroke-width="2"/>
  <text x="762" y="374" text-anchor="middle" font-size="16" font-weight="600" fill="#ffe4e6">results API</text>
  <text x="762" y="396" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.85">FastAPI · Redis cache</text>
  <text x="762" y="414" text-anchor="middle" font-size="12" fill="#fda4af" opacity="0.6">hot lookups skip the disk</text>

  <!-- cross-cutting observability -->
  <rect x="36" y="500" width="828" height="112" rx="14" fill="#2a0d18" fill-opacity="0.55" stroke="#fb7185" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
  <text x="450" y="540" text-anchor="middle" font-size="15" font-weight="600" fill="#ffe4e6">observability</text>
  <text x="450" y="564" text-anchor="middle" font-size="12.5" fill="#fda4af" opacity="0.85">Prometheus scrapes the runner and the API · Grafana dashboards</text>
  <text x="450" y="584" text-anchor="middle" font-size="12.5" fill="#fda4af" opacity="0.6">batch health, run latency, cache hit rate, one glance</text>
</svg>
