<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="gbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08221c"/><stop offset="1" stop-color="#070d0a"/>
    </linearGradient>
    <radialGradient id="gglow" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#34d399" stop-opacity="0.16"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <marker id="garr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="900" height="560" rx="18" fill="url(#gbg)"/>
  <rect width="900" height="560" rx="18" fill="url(#gglow)"/>

  <g stroke="#34d399" stroke-width="2">
    <rect x="36" y="140" width="190" height="96" rx="14" fill="#0b2b21"/>
    <rect x="266" y="140" width="170" height="96" rx="14" fill="#0b2b21"/>
    <rect x="476" y="140" width="180" height="96" rx="14" fill="#0b2b21" stroke-width="2.5"/>
  </g>

  <text x="131" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#d1fae5">React + TS client</text>
  <text x="131" y="194" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.85">Tailwind · Vite</text>
  <text x="131" y="212" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.6">most of the codebase</text>

  <text x="351" y="172" text-anchor="middle" font-size="16" font-weight="600" fill="#d1fae5">FastAPI</text>
  <text x="351" y="194" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.85">Clerk handles auth</text>
  <text x="351" y="212" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.6">thin layer speaking Cypher</text>

  <text x="566" y="166" text-anchor="middle" font-size="16" font-weight="600" fill="#d1fae5">Neo4j Aura</text>
  <text x="566" y="188" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.85">users &amp; posts are nodes</text>
  <text x="566" y="206" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.85">FOLLOWS · POSTED edges</text>
  <text x="566" y="224" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.6">relationships are the schema</text>

  <g stroke="#34d399" stroke-width="2" opacity="0.8">
    <path d="M226 188 H258" marker-end="url(#garr)"/>
    <path d="M436 188 H468" marker-end="url(#garr)"/>
  </g>

  <text x="785" y="44" text-anchor="middle" font-size="12" fill="#6ee7b7" opacity="0.7" letter-spacing="2">CYPHER TRAVERSALS</text>

  <g stroke="#34d399" stroke-width="2">
    <rect x="706" y="60" width="158" height="76" rx="14" fill="#0b2b21"/>
    <rect x="706" y="182" width="158" height="76" rx="14" fill="#0b2b21"/>
    <rect x="706" y="304" width="158" height="76" rx="14" fill="#0b2b21"/>
  </g>

  <text x="785" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#d1fae5">recommendations</text>
  <text x="785" y="112" text-anchor="middle" font-size="11.5" fill="#6ee7b7" opacity="0.75">2-hop: friends of friends</text>

  <text x="785" y="214" text-anchor="middle" font-size="14" font-weight="600" fill="#d1fae5">mutual connections</text>
  <text x="785" y="234" text-anchor="middle" font-size="11.5" fill="#6ee7b7" opacity="0.75">one traversal, no joins</text>

  <text x="785" y="336" text-anchor="middle" font-size="14" font-weight="600" fill="#d1fae5">search + ranking</text>
  <text x="785" y="356" text-anchor="middle" font-size="11.5" fill="#6ee7b7" opacity="0.75">full-text index · follower counts</text>

  <g stroke="#34d399" stroke-width="2" opacity="0.6" fill="none">
    <path d="M656 166 H676 V98 H698" marker-end="url(#garr)"/>
    <path d="M656 200 H676 V220 H698" marker-end="url(#garr)"/>
    <path d="M656 216 H670 V342 H698" marker-end="url(#garr)"/>
  </g>

  <rect x="36" y="470" width="828" height="52" rx="14" fill="#0b2b21" fill-opacity="0.55" stroke="#34d399" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
  <text x="450" y="502" text-anchor="middle" font-size="13" fill="#d1fae5">data: a real Stanford SNAP Twitter slice · ~1,200 users · ~50K FOLLOWS edges · genuine network topology</text>
</svg>
