<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="mmbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#24091a"/><stop offset="1" stop-color="#0c0710"/>
    </linearGradient>
    <radialGradient id="mmglow" cx="50%" cy="45%" r="60%">
      <stop offset="0" stop-color="#f472b6" stop-opacity="0.16"/><stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <marker id="mmarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#f472b6"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="18" fill="url(#mmbg)"/>
  <rect width="900" height="500" rx="18" fill="url(#mmglow)"/>

  <g stroke="#f472b6" stroke-width="1.8" stroke-opacity="0.85">
    <rect x="36" y="110" width="200" height="80" rx="12" fill="#2a0e1f"/>
    <rect x="36" y="250" width="200" height="80" rx="12" fill="#2a0e1f"/>
  </g>

  <text x="136" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#fce7f3">Spotify · 1M+ tracks</text>
  <text x="136" y="164" text-anchor="middle" font-size="11.5" fill="#f9a8d4" opacity="0.75">Kaggle · audio features, 2000–2023</text>

  <text x="136" y="282" text-anchor="middle" font-size="14" font-weight="600" fill="#fce7f3">Genius lyrics</text>
  <text x="136" y="304" text-anchor="middle" font-size="11.5" fill="#f9a8d4" opacity="0.75">scraped · words and page views</text>

  <g stroke="#f472b6" stroke-width="2" opacity="0.6" fill="none">
    <path d="M236 150 H266 V202"/>
    <path d="M236 290 H266 V238"/>
    <path d="M266 220 H288" marker-end="url(#mmarr)"/>
  </g>

  <g stroke="#f472b6" stroke-width="2">
    <rect x="296" y="172" width="210" height="96" rx="14" fill="#2a0e1f"/>
    <rect x="546" y="172" width="170" height="96" rx="14" fill="#2a0e1f"/>
    <rect x="756" y="172" width="108" height="96" rx="14" fill="#2a0e1f" stroke-width="2.5"/>
  </g>

  <text x="401" y="204" text-anchor="middle" font-size="16" font-weight="600" fill="#fce7f3">the merge</text>
  <text x="401" y="226" text-anchor="middle" font-size="12" fill="#f9a8d4" opacity="0.85">normalized artist + track names</text>
  <text x="401" y="244" text-anchor="middle" font-size="12" fill="#f9a8d4" opacity="0.6">139,433 records × 39 columns</text>

  <text x="631" y="204" text-anchor="middle" font-size="16" font-weight="600" fill="#fce7f3">features</text>
  <text x="631" y="226" text-anchor="middle" font-size="12" fill="#f9a8d4" opacity="0.85">danceability, energy, tempo,</text>
  <text x="631" y="244" text-anchor="middle" font-size="12" fill="#f9a8d4" opacity="0.6">valence + lyric sentiment</text>

  <text x="810" y="210" text-anchor="middle" font-size="16" font-weight="600" fill="#fce7f3">XGBoost</text>
  <text x="810" y="232" text-anchor="middle" font-size="12" fill="#f9a8d4" opacity="0.85">hit or not</text>

  <g stroke="#f472b6" stroke-width="2" opacity="0.8">
    <path d="M506 220 H538" marker-end="url(#mmarr)"/>
    <path d="M716 220 H748" marker-end="url(#mmarr)"/>
  </g>

  <rect x="36" y="392" width="828" height="64" rx="14" fill="#2a0e1f" fill-opacity="0.55" stroke="#f472b6" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
  <text x="450" y="418" text-anchor="middle" font-size="12.5" fill="#fce7f3">the model ladder: Random Forest baseline → LR · KNN · SVM · MLP → XGBoost</text>
  <text x="450" y="440" text-anchor="middle" font-size="12.5" fill="#f9a8d4" opacity="0.75">74.28% on imbalanced multiclass → balanced classes → 84.42% on the binary framing</text>
</svg>
