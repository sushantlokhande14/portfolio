<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1726"/><stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <radialGradient id="pglow" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#5e9eff" stop-opacity="0.18"/><stop offset="1" stop-color="#5e9eff" stop-opacity="0"/>
    </radialGradient>
    <marker id="parr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#5e9eff"/>
    </marker>
  </defs>

  <rect width="900" height="560" rx="18" fill="url(#pbg)"/>
  <rect width="900" height="560" rx="18" fill="url(#pglow)"/>

  <text x="36" y="104" font-size="12" fill="#9bb6e0" opacity="0.7" letter-spacing="2">QUERY PATH · EVERY SEARCH</text>

  <g stroke="#5e9eff" stroke-width="2">
    <rect x="36" y="120" width="150" height="96" rx="14" fill="#0d1b30"/>
    <rect x="226" y="120" width="220" height="96" rx="14" fill="#0d1b30" stroke-width="2.5"/>
    <rect x="486" y="120" width="180" height="96" rx="14" fill="#0d1b30"/>
    <rect x="706" y="120" width="158" height="96" rx="14" fill="#0d1b30"/>
  </g>

  <text x="111" y="158" text-anchor="middle" font-size="16" font-weight="600" fill="#dbeafe">query</text>
  <text x="111" y="180" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.85">one 128-d vector</text>

  <text x="336" y="152" text-anchor="middle" font-size="16" font-weight="600" fill="#dbeafe">SQ8 traversal</text>
  <text x="336" y="174" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.85">walks the graph on int8 codes</text>
  <text x="336" y="192" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.6">AVX2 vpmaddwd kernels</text>

  <text x="576" y="152" text-anchor="middle" font-size="16" font-weight="600" fill="#dbeafe">float32 re-rank</text>
  <text x="576" y="174" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.85">exact distances, but only</text>
  <text x="576" y="192" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.6">on the final shortlist</text>

  <text x="785" y="152" text-anchor="middle" font-size="16" font-weight="600" fill="#dbeafe">top-k</text>
  <text x="785" y="174" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.85">recall 0.9996</text>
  <text x="785" y="192" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.6">float-precision ceiling</text>

  <g stroke="#5e9eff" stroke-width="2" opacity="0.8">
    <path d="M186 168 H218" marker-end="url(#parr)"/>
    <path d="M446 168 H478" marker-end="url(#parr)"/>
    <path d="M666 168 H698" marker-end="url(#parr)"/>
  </g>

  <text x="36" y="324" font-size="12" fill="#9bb6e0" opacity="0.7" letter-spacing="2">BUILD PATH · ONCE</text>

  <g stroke="#5e9eff" stroke-width="2">
    <rect x="126" y="340" width="190" height="96" rx="14" fill="#0d1b30"/>
    <rect x="396" y="340" width="250" height="96" rx="14" fill="#0d1b30"/>
  </g>

  <text x="221" y="378" text-anchor="middle" font-size="16" font-weight="600" fill="#dbeafe">float32 vectors</text>
  <text x="221" y="400" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.85">100K × 128d</text>

  <text x="521" y="372" text-anchor="middle" font-size="16" font-weight="600" fill="#dbeafe">index build</text>
  <text x="521" y="394" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.85">HNSW layers + SQ8 codes</text>
  <text x="521" y="412" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.6">reorder(): BFS ids share cache lines</text>

  <path d="M316 388 H388" stroke="#5e9eff" stroke-width="2" opacity="0.8" marker-end="url(#parr)"/>
  <path d="M521 340 V280 H336 V224" stroke="#5e9eff" stroke-width="2" opacity="0.6" fill="none" marker-end="url(#parr)"/>
  <text x="545" y="300" font-size="11.5" fill="#9bb6e0" opacity="0.7">the graph queries walk on</text>

  <rect x="36" y="472" width="828" height="64" rx="14" fill="#0d1b30" fill-opacity="0.55" stroke="#5e9eff" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
  <text x="450" y="498" text-anchor="middle" font-size="13" fill="#dbeafe">12,049 queries/sec single-threaded at 0.999 recall@10 · 1.8× hnswlib · 2.5× FAISS HNSWFlat</text>
  <text x="450" y="520" text-anchor="middle" font-size="12" fill="#9bb6e0" opacity="0.7">why it wins: int8 copies (12.8 MB) fit L3 cache, the float32 originals (51 MB) do not</text>
</svg>
