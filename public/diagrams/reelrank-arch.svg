<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" fill="none" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="rrbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08171c"/><stop offset="1" stop-color="#070a10"/>
    </linearGradient>
    <radialGradient id="rrglow" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.18"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <marker id="rrarr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#22d3ee"/>
    </marker>
  </defs>

  <rect width="900" height="560" rx="18" fill="url(#rrbg)"/>
  <rect width="900" height="560" rx="18" fill="url(#rrglow)"/>

  <text x="36" y="104" font-size="12" fill="#7dd3fc" opacity="0.7" letter-spacing="2">SERVING · EVERY REQUEST</text>

  <g stroke="#22d3ee" stroke-width="2">
    <rect x="36" y="120" width="180" height="96" rx="14" fill="#0b2a33"/>
    <rect x="256" y="120" width="210" height="96" rx="14" fill="#0b2a33"/>
    <rect x="506" y="120" width="170" height="96" rx="14" fill="#0b2a33" stroke-width="2.5"/>
    <rect x="716" y="120" width="148" height="96" rx="14" fill="#0b2a33"/>
  </g>

  <text x="126" y="158" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">request</text>
  <text x="126" y="180" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">a user, a few likes,</text>
  <text x="126" y="198" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.6">or a free-text vibe</text>

  <text x="361" y="158" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">encoders</text>
  <text x="361" y="180" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">two-tower user side ·</text>
  <text x="361" y="198" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.6">sentence-transformer for text</text>

  <text x="591" y="158" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">Proxima ANN</text>
  <text x="591" y="180" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">SQ8 int8 index</text>
  <text x="591" y="198" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.6">~200 candidates out</text>

  <text x="790" y="158" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">ranker</text>
  <text x="790" y="180" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">MLP re-scorer</text>
  <text x="790" y="198" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.6">the list you see</text>

  <g stroke="#22d3ee" stroke-width="2" opacity="0.8">
    <path d="M216 168 H248" marker-end="url(#rrarr)"/>
    <path d="M466 168 H498" marker-end="url(#rrarr)"/>
    <path d="M676 168 H708" marker-end="url(#rrarr)"/>
  </g>

  <text x="36" y="344" font-size="12" fill="#7dd3fc" opacity="0.7" letter-spacing="2">OFFLINE · TRAINING + A DAILY JOB</text>

  <g stroke="#22d3ee" stroke-width="2">
    <rect x="36" y="360" width="250" height="96" rx="14" fill="#0b2a33"/>
    <rect x="336" y="360" width="240" height="96" rx="14" fill="#0b2a33"/>
    <rect x="626" y="360" width="180" height="96" rx="14" fill="#0b2a33"/>
  </g>

  <text x="161" y="398" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">data</text>
  <text x="161" y="420" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">MovieLens interactions ·</text>
  <text x="161" y="438" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.6">daily TMDB trending pull</text>

  <text x="456" y="398" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">hybrid item tower</text>
  <text x="456" y="420" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">collaborative + content embeddings</text>
  <text x="456" y="438" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.6">zero-rating movies still land</text>

  <text x="716" y="398" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">index build</text>
  <text x="716" y="420" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">movies as vectors</text>

  <g stroke="#22d3ee" stroke-width="2" opacity="0.8">
    <path d="M286 408 H328" marker-end="url(#rrarr)"/>
    <path d="M576 408 H618" marker-end="url(#rrarr)"/>
  </g>
  <path d="M716 360 V280 H591 V224" stroke="#22d3ee" stroke-width="2" opacity="0.6" fill="none" marker-end="url(#rrarr)"/>
  <text x="732" y="300" font-size="11.5" fill="#7dd3fc" opacity="0.7">refreshed daily</text>

  <rect x="36" y="488" width="828" height="52" rx="14" fill="#0b2a33" fill-opacity="0.55" stroke="#22d3ee" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
  <text x="450" y="520" text-anchor="middle" font-size="13" fill="#e0fbff">hybrid beats popularity and content baselines on a leakage-free temporal split · cold start: ~10× recall on unseen items</text>
</svg>
