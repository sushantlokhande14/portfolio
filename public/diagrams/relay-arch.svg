  <rect x="36" y="488" width="828" height="52" rx="14" fill="#0b2a33" fill-opacity="0.55" stroke="#22d3ee" stroke-width="1.6" stroke-dasharray="6 6" stroke-opacity="0.7"/>
  <text x="450" y="520" text-anchor="middle" font-size="13" fill="#e0fbff">p50 759 → 44 ms · 32 → 167 req/s · spend −76% · 78% of requests never reach a provider</text>
