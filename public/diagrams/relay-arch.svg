  <path d="M755 236 V352" stroke="#22d3ee" stroke-width="2" opacity="0.6" marker-end="url(#rarr)"/>
  <text x="770" y="300" font-size="11.5" fill="#7dd3fc" opacity="0.7">miss</text>

  <path d="M521 352 V244" stroke="#22d3ee" stroke-width="1.6" opacity="0.5" stroke-dasharray="5 6"/>
  <text x="507" y="300" text-anchor="end" font-size="11.5" fill="#7dd3fc" opacity="0.7">reads · writes · rebuilds</text>

  <g stroke="#22d3ee" stroke-width="2">
    <rect x="421" y="360" width="200" height="96" rx="14" fill="#0b2a33"/>
    <rect x="666" y="360" width="198" height="96" rx="14" fill="#0b2a33"/>
