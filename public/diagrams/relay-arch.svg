  <text x="755" y="176" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">semantic cache</text>
  <text x="755" y="198" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">MiniLM 384-d → Proxima ANN</text>
  <text x="755" y="216" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.6">0.90 cosine gate · hit: 24%</text>

  <g stroke="#22d3ee" stroke-width="2" opacity="0.8">
    <path d="M166 188 H198" marker-end="url(#rarr)"/>
    <path d="M396 188 H428" marker-end="url(#rarr)"/>
    <path d="M606 188 H638" marker-end="url(#rarr)"/>
