  <text x="521" y="176" text-anchor="middle" font-size="16" font-weight="600" fill="#e0fbff">exact cache</text>
  <text x="521" y="198" text-anchor="middle" font-size="12" fill="#7dd3fc" opacity="0.85">sha256 of prompt + params</text>
